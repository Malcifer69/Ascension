<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Finance</title>
<!--
  FINANCE â€” five pages, one bottom tab bar: Net worth (accounts by category +
  stocks â†’ the trend + allocation), Stocks (holdings, live-priced via Finnhub),
  Subscriptions (billing period, renewal countdown, linked account), Orders
  (incoming/bought, % of net worth, deduct from an account), Wishlist (% of
  net worth per item).

  Sealed: no network. Saves through window.Vitality. Stock prices via the host
  bridge: window.Vitality.stock(symbol) (server-routed Finnhub key; manual works
  keyless). Store: { accounts:[{id,name,balance,type}], holdings:[{id,symbol,shares,price}],
  subs:[{id,name,amount,period,renewal,fromAccountId,autoDeduct}],
  orders:[{id,name,amount,mode,fromAccountId,arrival,ts,deductedAt,pctAtDeduction,deductedFromName}],
  wishlist:[{id,name,amount,ts}], history:[{t,value}], activity:[{id,ts,name,type,delta,kind}] }
-->
<style>
  :root{
    --bg:#050506;--fg:#ededf0;--brand:#6EE7B7;
    --muted:#84848c;--muted-strong:#a8a8b0;--border:#1d1d22;
    --neg:#ff8b8b;
    --cat-bank:#3D72D6;--cat-stocks:#1D9E6C;--cat-crypto:#B8811A;--cat-other:#8465E0;--cat-subs:#E0703D;
    --mono:ui-monospace,SFMono-Regular,Menlo,monospace;
    --serif:Georgia,'Times New Roman',serif;
    --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,sans-serif;
    --ease:cubic-bezier(.16,1,.3,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--fg);font:15px/1.5 var(--font);display:flex;justify-content:center;padding:40px 20px calc(96px + env(safe-area-inset-bottom));-webkit-font-smoothing:antialiased;position:relative}
  body::before{content:'';position:fixed;inset:0;z-index:-2;pointer-events:none;background:
    radial-gradient(58% 44% at 50% -6%, rgba(110,231,183,.13), transparent 62%),
    radial-gradient(1.5px 1.5px at 14% 16%, rgba(255,255,255,.5), transparent 100%),
    radial-gradient(1px 1px at 76% 10%, rgba(255,255,255,.4), transparent 100%),
    radial-gradient(1.5px 1.5px at 52% 6%, rgba(255,255,255,.32), transparent 100%),
    radial-gradient(1px 1px at 30% 28%, rgba(255,255,255,.28), transparent 100%)}
  body::after{content:'';position:fixed;left:0;right:0;bottom:0;height:32vh;z-index:-1;pointer-events:none;background:
    linear-gradient(to top, rgba(8,19,14,.85), transparent 80%),
    linear-gradient(115deg, transparent 42%, rgba(13,26,23,.75) 43%, rgba(13,26,23,.75) 58%, transparent 59%),
    linear-gradient(245deg, transparent 38%, rgba(10,18,16,.9) 39%, rgba(10,18,16,.9) 62%, transparent 63%);
    -webkit-mask-image:linear-gradient(to top,#000 55%,transparent);mask-image:linear-gradient(to top,#000 55%,transparent)}
  .shell{width:100%;max-width:600px}
  h1{font-size:24px;font-weight:600;letter-spacing:-.01em}
  .sub{color:var(--muted);font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;margin:6px 0 0}
  .well{margin-top:34px;text-align:center}
  .kick{font-family:var(--mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--brand)}
  .worth{font-family:var(--serif);font-style:italic;font-size:clamp(44px,9.5vw,68px);line-height:1;color:#fff;margin-top:12px;text-shadow:0 0 44px rgba(110,231,183,.22)}
  .worth.neg{color:var(--neg);text-shadow:0 0 44px rgba(255,139,139,.18)}
  .worth .u{font-size:.34em;font-style:normal;color:var(--muted);margin-left:2px}
  .delta{font-family:var(--mono);font-size:11px;letter-spacing:.14em;margin-top:10px;color:var(--muted)}
  .delta b{color:var(--brand);font-weight:600}
  .delta b.down{color:var(--neg)}
  .gwrap{margin-top:28px}
  .gEmpty{padding:22px 0;color:var(--muted);font-size:12.5px;text-align:center}
  .gEmpty b{color:var(--brand);font-weight:600}
  .list{margin-top:26px;text-align:left;max-width:510px;margin-left:auto;margin-right:auto}
  .row{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:10px;padding:11px 13px;border-radius:12px;border:1px solid var(--border);background:rgba(14,14,17,.5);margin-bottom:8px;animation:up .4s var(--ease) both}
  @keyframes up{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
  .row .nmwrap{min-width:0}
  .row .nm{font-size:14px;color:var(--fg);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .row .hsub{font-family:var(--mono);font-size:10px;letter-spacing:.04em;color:var(--muted);margin-top:1px}
  .row .bal{font-family:var(--mono);font-size:14px;font-variant-numeric:tabular-nums;cursor:pointer;color:var(--muted-strong);padding:3px 7px;border-radius:6px;transition:background .12s,color .12s}
  .row .bal:hover{background:rgba(110,231,183,.09);color:var(--brand)}
  .row .bal.neg{color:var(--neg)}
  .row .del{border:none;background:none;color:var(--muted);cursor:pointer;font-size:15px;line-height:1;opacity:.45;padding:2px 4px;transition:opacity .12s,color .12s}
  .row .del:hover{opacity:1;color:var(--neg)}
  .balIn{width:118px;background:rgba(0,0,0,.45);border:1px solid var(--brand);border-radius:6px;padding:4px 8px;color:var(--fg);font-family:var(--mono);font-size:14px;text-align:right;outline:none}
  .addRow{display:grid;grid-template-columns:1fr 122px auto;gap:8px;margin-top:2px}
  .addRow.stock{grid-template-columns:1fr 100px auto}
  .addRow.wide{grid-template-columns:1fr 1fr auto}
  .addRow input,.addRow select{background:rgba(14,14,17,.7);border:1px solid var(--border);border-radius:10px;padding:10px 13px;color:var(--fg);font:inherit;font-size:13px;outline:none;min-width:0}
  .addRow input:focus,.addRow select:focus{border-color:var(--brand)}
  .addRow button{border:none;background:var(--brand);color:#04140d;font-weight:700;border-radius:10px;padding:0 17px;cursor:pointer}
  .addBtn{margin-top:4px;background:transparent;border:1px dashed var(--border);border-radius:10px;color:var(--muted);font:inherit;font-size:12.5px;padding:10px 14px;cursor:pointer;width:100%;transition:color .14s,border-color .14s}
  .addBtn:hover{color:var(--brand);border-color:var(--brand);border-style:solid}
  .keyNote{font-family:var(--mono);font-size:10px;letter-spacing:.02em;color:var(--muted);margin-top:12px;text-align:center}
  .keyNote b{color:var(--brand)}
  /* the bottom tab bar â€” each button is a page. A floating glass capsule,
     fixed to the tile's own viewport so it never shifts when a shorter/taller
     tab swaps in above it â€” translucent + blurred so scrolling content never
     reads as ducking behind a hard black box. */
  .tabBar{position:fixed;left:50%;bottom:calc(18px + env(safe-area-inset-bottom));
    transform:translateX(-50%);z-index:20;display:flex;gap:2px;
    width:calc(100% - 40px);max-width:540px;padding:6px;border-radius:999px;
    background:rgba(11,15,13,.55);
    backdrop-filter:blur(24px) saturate(1.7);-webkit-backdrop-filter:blur(24px) saturate(1.7);
    border:1px solid rgba(110,231,183,.22);
    box-shadow:0 14px 40px -10px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.05),0 0 26px -8px rgba(110,231,183,.16)}
  .tab{flex:1;padding:10px 4px;border-radius:999px;border:none;background:transparent;color:var(--muted-strong);font:inherit;font-size:11.5px;font-weight:600;cursor:pointer;transition:color .18s,background .18s;white-space:nowrap}
  .tab:hover{color:#fff}
  .tab.on{color:#04140d;background:var(--brand);box-shadow:0 2px 14px -3px rgba(110,231,183,.55)}
  .starterTag{width:max-content;max-width:92%;margin:0 auto 20px;padding:6px 14px;border:1px solid rgba(110,231,183,.25);border-radius:999px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:#84848c;text-align:center}
  .starterTag,.starterTag *{line-height:1.6}

  /* ---- net worth: chart + donut + category cards + activity ---- */
  .section{text-align:left}
  .sectionEyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  .overviewGrid{display:grid;grid-template-columns:1.5fr 1fr;gap:12px;margin-top:18px}
  @media (max-width:560px){.overviewGrid{grid-template-columns:1fr}}
  .card{border:1px solid var(--border);border-radius:16px;background:rgba(14,14,17,.5);padding:16px}
  .chartHead{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
  .chartHeadLeft{display:flex;align-items:baseline;gap:8px}
  .chartLabel{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .chartDelta{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--muted-strong)}
  .chartDelta.up{color:var(--brand)}
  .chartDelta.down{color:var(--neg)}
  .periodSeg{display:flex;gap:3px}
  .periodBtn{background:transparent;border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:9.5px;padding:4px 7px;border-radius:7px;cursor:pointer}
  .periodBtn:hover{color:#fff}
  .periodBtnActive{background:var(--brand);color:#04140d;border-color:var(--brand)}
  .chartSvgWrap{position:relative;margin-top:10px}
  .chartSvg{width:100%;height:120px;display:block;overflow:visible}
  .chartGrid{stroke:var(--border);stroke-width:1}
  .chartCrosshair{stroke:rgba(255,255,255,.25);stroke-width:1;pointer-events:none}
  .chartHoverDot{fill:currentColor;stroke:var(--bg);stroke-width:2;pointer-events:none}
  .chartTip{position:absolute;top:0;transform:translate(-50%,-100%);background:#0c0c10;border:1px solid var(--border);border-radius:8px;padding:6px 9px;font-family:var(--mono);font-size:10.5px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .1s}
  .chartTip.show{opacity:1}
  .chartTip b{color:var(--fg);font-size:12px;display:block}
  .chartTip span{color:var(--muted)}
  .chartStatsRow{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:14px}
  .chartStat{display:flex;flex-direction:column;gap:2px}
  .chartStatLabel{font-family:var(--mono);font-size:8.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .chartStatVal{font-family:var(--mono);font-size:12px;color:var(--muted-strong)}
  .chartEmpty{padding:30px 0;text-align:center;color:var(--muted);font-size:12.5px}

  .donutStage{position:relative;width:132px;height:132px;margin:8px auto 0}
  .donutSvg{width:100%;height:100%}
  .donutSvg path{transition:opacity .12s;cursor:pointer}
  .donutSvg path:hover{opacity:.8}
  .donutCenter{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
  .donutNum{font-family:var(--mono);font-size:13px;color:var(--fg)}
  .donutSub{font-family:var(--mono);font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .donutLegend{margin-top:14px;display:flex;flex-direction:column;gap:7px}
  .donutLeg{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted-strong)}
  .donutLegDot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
  .donutLeg span:nth-child(2){flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .donutLegPct{font-family:var(--mono);font-size:10.5px;color:var(--muted)}
  .donutEmpty{margin-top:10px;text-align:center;color:var(--muted);font-size:11.5px}

  .accountsGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
  @media (max-width:560px){.accountsGrid{grid-template-columns:1fr}}
  .accountCard{border:1px solid var(--border);border-radius:16px;background:rgba(14,14,17,.5);padding:14px}
  .accountHead{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .accountLabel{font-size:13px;font-weight:600}
  .accountTotal{font-family:var(--mono);font-size:12px;color:var(--muted-strong)}
  .accountTotalPct{color:var(--muted);margin-left:3px}
  .accountList{display:flex;flex-direction:column;gap:6px}
  .accountRow{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:8px;padding:8px 4px}
  .accountRowName{font-size:13px;cursor:pointer}
  .accountRowAmount{font-family:var(--mono);font-size:13px;color:var(--muted-strong);cursor:pointer;padding:2px 6px;border-radius:6px}
  .accountRowAmount:hover{background:rgba(110,231,183,.09);color:var(--brand)}
  .inlineEditInput{width:100%;background:rgba(0,0,0,.45);border:1px solid var(--brand);border-radius:6px;padding:4px 7px;color:var(--fg);font-family:var(--mono);font-size:13px;outline:none}
  .inlineEditAmt{text-align:right}
  .deleteBtn{border:none;background:none;color:var(--muted);cursor:pointer;font-size:14px;opacity:.4}
  .deleteBtn:hover{opacity:1;color:var(--neg)}
  .quickAdd{display:grid;grid-template-columns:1fr 1fr auto;gap:6px;margin-top:8px}
  .quickAddInput{background:rgba(0,0,0,.35);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--fg);font:inherit;font-size:12.5px;outline:none;min-width:0}
  .quickAddInput:focus{border-color:var(--brand)}
  .quickAddBtn{border:none;background:var(--brand);color:#04140d;font-weight:700;border-radius:8px;padding:0 12px;cursor:pointer}
  .addToggle{margin-top:8px;background:transparent;border:1px dashed var(--border);border-radius:8px;color:var(--muted);font:inherit;font-size:11.5px;padding:8px 10px;cursor:pointer;width:100%}
  .addToggle:hover{color:var(--brand);border-color:var(--brand)}

  .activity{margin-top:18px;border-top:1px solid var(--border);padding-top:14px}
  .activityHead{display:flex;justify-content:space-between;margin-bottom:8px}
  .activityEmpty{color:var(--muted);font-size:12px;padding:8px 0}
  .activityBucketLabel{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:10px 0 6px}
  .activityRow{display:grid;grid-template-columns:3px 1fr auto auto;align-items:center;gap:9px;padding:6px 2px}
  .activityBar{height:20px;border-radius:2px}
  .activityName{font-size:12.5px}
  .activityMeta{font-family:var(--mono);font-size:9.5px;color:var(--muted)}
  .activityAmt{font-family:var(--mono);font-size:12px}
  .activityAmt.up{color:var(--brand)}
  .activityAmt.down{color:var(--neg)}
  .activityDate{font-family:var(--mono);font-size:9.5px;color:var(--muted)}

  /* ---- subs / orders / wishlist ---- */
  .addCard{border:1px solid var(--border);border-radius:16px;background:rgba(14,14,17,.5);padding:14px;margin-bottom:16px}
  .addEyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  .addGrid{display:grid;grid-template-columns:1.4fr 1fr 1fr auto;gap:8px;align-items:center}
  .addGrid.bought{grid-template-columns:1.4fr 1fr 1.2fr auto}
  @media (max-width:560px){.addGrid,.addGrid.bought{grid-template-columns:1fr}}
  .subsCheck{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--muted-strong);margin-top:10px}
  .emptyState{padding:22px 4px;text-align:center}
  .emptyTitle{font-size:13.5px;color:var(--fg);margin-bottom:4px}
  .emptyBody{font-size:12px;color:var(--muted);max-width:360px;margin:0 auto}
  .subsHero,.wishHero{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .nwHeroLabel{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .subsHeroNum,.wishHeroNum{font-family:var(--serif);font-style:italic;font-size:34px;color:#fff;margin-top:4px}
  .subsHeroNumSuffix{font-size:.4em;font-style:normal;color:var(--muted);margin-left:3px}
  .subsHeroSub{font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-top:2px}
  .sectionCount{color:var(--muted);font-weight:400}
  .sectionCountSep{color:var(--muted)}
  .sectionEyebrow{display:flex;justify-content:space-between;align-items:baseline}

  .subRow{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:12px;padding:12px 13px;border-radius:12px;border:1px solid var(--border);background:rgba(14,14,17,.5);margin-bottom:8px}
  .subRow.urgent{border-color:rgba(255,139,139,.4)}
  .subRowName{font-size:13.5px}
  .subRowPeriod{font-family:var(--mono);font-size:9.5px;text-transform:capitalize;color:var(--muted);margin-top:2px}
  .subRowRenew{font-family:var(--mono);font-size:9.5px;color:var(--muted-strong);margin-top:2px}
  .subRowPills{display:flex;align-items:center;gap:6px;margin-top:6px;flex-wrap:wrap}
  .subPill{font-family:var(--mono);font-size:9px;color:var(--muted);border:1px solid var(--border);border-radius:999px;padding:2px 7px}
  .subToggle{display:flex;align-items:center;gap:5px;background:transparent;border:1px solid var(--border);border-radius:999px;padding:3px 9px 3px 6px;color:var(--muted);font:inherit;font-size:9.5px;cursor:pointer}
  .subToggle.on{border-color:var(--brand);color:var(--brand)}
  .subToggleDot{width:6px;height:6px;border-radius:50%;background:var(--muted)}
  .subToggle.on .subToggleDot{background:var(--brand)}
  .subRowCost{text-align:right}
  .subRowCostBig{font-family:var(--mono);font-size:15px;color:var(--fg)}
  .subRowCostUnit{font-family:var(--mono);font-size:9px;color:var(--muted)}
  .subRowCostBilled{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:2px}
  .subRowActions{display:flex;gap:4px}
  .iconBtn{border:1px solid var(--border);background:transparent;color:var(--muted);border-radius:7px;padding:5px 8px;font-size:11px;cursor:pointer}
  .iconBtn:hover{color:var(--fg);border-color:var(--muted)}

  .modeSeg{display:flex;gap:4px}
  .modeBtn{background:transparent;border:1px solid var(--border);color:var(--muted);font:inherit;font-size:11px;padding:5px 10px;border-radius:8px;cursor:pointer}
  .modeBtnActive{background:var(--brand);color:#04140d;border-color:var(--brand)}
  .addCardHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .addPreview{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:9px}
  .addPreview.warn{color:#e8c878}
  .quickAddInputAlert{border-color:#e8c878}
  .ordCard{border:1px solid var(--border);border-radius:12px;background:rgba(14,14,17,.5);padding:13px;margin-bottom:8px}
  .ordCard.deducted{opacity:.6}
  .ordHead{display:flex;align-items:center;gap:8px}
  .ordName{flex:1;font-size:13.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ordAmt{font-family:var(--mono);font-size:14px}
  .ordMetaRow{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
  .ordPill{font-family:var(--mono);font-size:9px;color:var(--muted);border:1px solid var(--border);border-radius:999px;padding:2px 8px}
  .ordPill.good{color:var(--brand);border-color:rgba(110,231,183,.35)}
  .ordPill.warn{color:#e8c878;border-color:rgba(232,200,120,.35)}
  .ordPill.bad{color:var(--neg);border-color:rgba(255,139,139,.35)}
  .ordPill.today,.ordPill.imminent{color:#e8c878;border-color:rgba(232,200,120,.35)}
  .ordPill.past{color:var(--neg);border-color:rgba(255,139,139,.35)}
  .ordFoot{margin-top:9px;display:flex;justify-content:space-between;align-items:center}
  .ordDeductedPill{font-family:var(--mono);font-size:9.5px;color:var(--muted)}
  .ordDeductBtn{background:transparent;border:1px solid var(--border);color:var(--muted-strong);font:inherit;font-size:11px;padding:6px 10px;border-radius:8px;cursor:pointer}
  .ordDeductBtn:hover{color:var(--brand);border-color:var(--brand)}

  .wishHeroTop{display:flex;justify-content:space-between;align-items:flex-start}
  .wishHeroPctNum{font-family:var(--mono);font-size:20px;color:var(--muted-strong);margin-top:4px}
  .wishHeroPctNum.warn{color:#e8c878}
  .wishHeroPctNum.bad{color:var(--neg)}
  .wishHeroBar{height:5px;border-radius:99px;background:var(--border);margin-top:12px;overflow:hidden}
  .wishHeroBarFill{height:100%;background:var(--brand);border-radius:99px}
  .wishHeroBarFill.warn{background:#e8c878}
  .wishHeroBarFill.bad{background:var(--neg)}
  .wishHeroFoot{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:8px}
  .wishRow{border:1px solid var(--border);border-radius:12px;background:rgba(14,14,17,.5);padding:12px 13px;margin-bottom:8px}
  .wishRowH{display:flex;align-items:flex-start;gap:10px}
  .wishRowName{font-size:13.5px}
  .wishRowMeta{font-family:var(--mono);font-size:9.5px;color:var(--muted);margin-top:2px}
  .wishRowAmtWrap{margin-left:auto;text-align:right}
  .wishRowAmt{font-family:var(--mono);font-size:14px}

function windowedHistory(){
  const full=hist();const p=PERIODS.find(x=>x.key===chartPeriod)||PERIODS[PERIODS.length-1];
  if(p.days==null)return full;
  const cutoff=Date.now()-p.days*86400000;
  const inWin=full.filter(x=>x.t>=cutoff);
  if(inWin.length>=2||full.length===0)return inWin;
  let anchor=null;for(let i=full.length-1;i>=0;i--){if(full[i].t<cutoff){anchor=full[i];break}}
  return anchor?[anchor].concat(inWin):inWin;
}
function smoothPath(pts){
  if(pts.length<2)return '';
  if(pts.length===2)return 'M'+pts[0].x+','+pts[0].y+' L'+pts[1].x+','+pts[1].y;
  const d=['M'+pts[0].x+','+pts[0].y];
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[i-1]||pts[i],p1=pts[i],p2=pts[i+1],p3=pts[i+2]||p2;
    const c1x=p1.x+(p2.x-p0.x)/6,c1y=p1.y+(p2.y-p0.y)/6,c2x=p2.x-(p3.x-p1.x)/6,c2y=p2.y-(p3.y-p1.y)/6;
    d.push('C'+c1x+','+c1y+' '+c2x+','+c2y+' '+p2.x+','+p2.y);
  }
  return d.join(' ');
}
function dailyDeltaHtml(){

  let base=null;for(let i=h.length-1;i>=0;i--){if(h[i].t<=cutoff){base=h[i];break}}
  if(!base)base=h[0];
  if(last.t-base.t<3600000)return '';
  const delta=last.value-base.value;
  if(Math.abs(delta)<0.005)return '<div class="delta">flat Â· 24h</div>';
  const up=delta>0;
  return '<div class="delta"><b class="'+(up?'':'down')+'">'+(up?'â–² ':'â–¼ ')+esc(fmtMoney(Math.abs(delta)))+'</b> Â· 24h</div>';
}

  const color=dir==='up'?'var(--brand)':dir==='down'?'var(--neg)':'var(--muted)';
  let deltaLabel='Flat';

  }
  const vals=history.map(p=>p.value),minV=Math.min.apply(null,vals),maxV=Math.max.apply(null,vals);
  const range=(maxV-minV)||Math.max(1,Math.abs(maxV));

  else{pts=history.map((p,i)=>({x:(i/(history.length-1))*W,y:H-PAD-((p.value-minV)/range)*(H-PAD*2),t:p.t,v:p.value}));lineD=smoothPath(pts);const lp=pts[pts.length-1],fp=pts[0];areaD=lineD+' L'+lp.x+','+H+' L'+fp.x+','+H+' Z';}

    +'</div></div>'
    +'<div class="chartStatsRow">'+statCell('1% of NW',fmtMoney(last/100))+statCell('All-time high',fmtMoney(maxV))+statCell('All-time low',fmtMoney(minV))+statCell('Snapshots',String(history.length))+'</div></div>';
}
function donutArcPath(cx,cy,rO,rI,a1,a2){
  const x1o=cx+rO*Math.cos(a1),y1o=cy+rO*Math.sin(a1),x2o=cx+rO*Math.cos(a2),y2o=cy+rO*Math.sin(a2);
  const x1i=cx+rI*Math.cos(a2),y1i=cy+rI*Math.sin(a2),x2i=cx+rI*Math.cos(a1),y2i=cy+rI*Math.sin(a1);
  const large=a2-a1>Math.PI?1:0;
  return 'M '+x1o.toFixed(2)+' '+y1o.toFixed(2)+' A '+rO+' '+rO+' 0 '+large+' 1 '+x2o.toFixed(2)+' '+y2o.toFixed(2)+' L '+x1i.toFixed(2)+' '+y1i.toFixed(2)+' A '+rI+' '+rI+' 0 '+large+' 0 '+x2i.toFixed(2)+' '+y2i.toFixed(2)+' Z';
}
function donutHtml(nw){
  const slices=[];
  ['bank','crypto','other'].forEach(t=>{const v=acctTotal(t);if(v>0)slices.push({name:TYPE_LABELS[t],color:CAT_COLOR[t],value:v})});

  const annualSubs=monthlyBurn()*12;if(annualSubs>0)slices.push({name:'Subs / yr',color:CAT_COLOR.subs,value:annualSubs});

  }
  let angle=-Math.PI/2;const arcs=[];
  slices.forEach(s=>{const sa=(s.value/total)*Math.PI*2;const pad=slices.length>1?0.015:0;const a1=angle+pad,a2=angle+sa-pad;if(a2>a1)arcs.push({color:s.color,d:donutArcPath(70,70,60,44,a1,a2),name:s.name,pct:(s.value/total)*100,value:s.value});angle+=sa;});

    +'<div class="donutCenter"><div class="donutNum">'+esc(fmtMoney(nw))+'</div><div class="donutSub">total</div></div></div>'
    +'<div class="donutLegend">'+legend+'</div></div>';
}

const ACTIVITY_BUCKETS=[{key:'today',label:'Today'},{key:'yesterday',label:'Yesterday'},{key:'week',label:'Earlier this week'},{key:'older',label:'Earlier'}];
function fmtActDate(ts){
  const d=new Date(ts),now=new Date();

  const dayStart=new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime();

/* ============================================================
 * SUBSCRIPTIONS â€” billing period, renewal countdown, linked account
 * ============================================================ */
function nextRenewalDate(iso,period){
  if(!iso)return null;
  const isoSafe=/^\d{4}-\d{2}-\d{2}$/.test(iso)?iso+'T00:00':iso;
  let d=new Date(isoSafe);if(isNaN(d.getTime()))return null;
  const now=new Date();
  const step=period==='yearly'?[0,1,0]:period==='weekly'?[0,0,7]:[0,1,0];
  let guard=0;
  while(d.getTime()<now.getTime()&&guard<600){
    if(period==='weekly')d=new Date(d.getFullYear(),d.getMonth(),d.getDate()+7);
    else if(period==='yearly')d=new Date(d.getFullYear()+1,d.getMonth(),d.getDate());
    else d=new Date(d.getFullYear(),d.getMonth()+1,d.getDate());
    guard++;
  }
  return d;
}
function daysToNext(s){if(!s.renewal)return null;const next=nextRenewalDate(s.renewal,s.period);if(!next)return null;const now=new Date();const today=new Date(now.getFullYear(),now.getMonth(),now.getDate()).getTime();return Math.round((next.getTime()-today)/86400000)}
function formatRenewal(iso){
  if(!iso)return '';
  const isoSafe=/^\d{4}-\d{2}-\d{2}$/.test(iso)?iso+'T00:00':iso;
  const d=new Date(isoSafe);if(isNaN(d.getTime()))return iso;
  const now=new Date();const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());

  const diff=Math.round((dayStart.getTime()-today.getTime())/86400000);
  const label=d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});

  return prefix+label;
}

function arrivalLabel(iso){
  if(!iso)return null;
  const isoSafe=/^\d{4}-\d{2}-\d{2}$/.test(iso)?iso+'T00:00':iso;
  const d=new Date(isoSafe);if(isNaN(d.getTime()))return null;
  const now=new Date();const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const dayStart=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  const diff=Math.round((dayStart.getTime()-today.getTime())/86400000);
  const date=d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  if(diff<0)return {label:Math.abs(diff)+'d late Â· '+date,cls:'past'};
  if(diff===0)return {label:'arrives today Â· '+date,cls:'today'};
  if(diff===1)return {label:'arrives tomorrow Â· '+date,cls:'imminent'};
  if(diff<=5)return {label:'in '+diff+'d Â· '+date,cls:'imminent'};
  return {label:'in '+diff+'d Â· '+date,cls:''};
}

}

function commit(){
  const nameIn=document.getElementById('editNameIn'),amtIn=document.getElementById('editAmtIn'),genIn=document.getElementById('editIn');
  if(!editingId){return}
  if(nameIn&&editKind==='name'){
    const a=accts().find(x=>x.id===editingId);
    if(a){const v=nameIn.value.trim();if(v)a.name=v;}
    editingId=null;persist();render();return;
  }
  if(amtIn&&editKind==='amt'){
    const a=accts().find(x=>x.id===editingId);
    const raw=String(amtIn.value).replace(/[$,\s]/g,'');const n=Number(raw);
    if(a&&raw!==''&&isFinite(n)){const delta=n-(a.balance||0);a.balance=n;pushActivity({name:a.name,type:a.type,delta,kind:'edit'});snapshot();persist();}
    editingId=null;render();return;
  }
  if(genIn&&editKind==='sh'){
    const hd=holds().find(x=>x.id===editingId);editingId=null;
    const raw=String(genIn.value).replace(/[,\s]/g,'');const n=Number(raw);
    if(hd&&raw!==''&&isFinite(n)&&n>=0){hd.shares=n;snapshot();persist();render();refreshStock(hd);return;}
    render();return;
  }
  editingId=null;render();
}

document.addEventListener('click',e=>{
  const tab=e.target.closest('[data-view]');
  if(tab){view=tab.getAttribute('data-view');editingId=null;adding=addingStock=addingSub=false;subEditId=null;hoverIdx=null;render();return}
  const period=e.target.closest('[data-act="period"]');
  if(period){chartPeriod=period.getAttribute('data-p');hoverIdx=null;render();return}
  const en=e.target.closest('[data-act="editName"]');
  if(en){editingId=en.getAttribute('data-id');editKind='name';render();return}
  const ea=e.target.closest('[data-act="editAmt"]');
  if(ea){editingId=ea.getAttribute('data-id');editKind='amt';render();return}
  const sh=e.target.closest('[data-sh]');
  if(sh){editingId=sh.getAttribute('data-sh');editKind='sh';render();return}
  const delAcc=e.target.closest('[data-act="delAcc"]');
  if(delAcc){const id=delAcc.getAttribute('data-id');const a=accts().find(x=>x.id===id);if(a){pushActivity({name:a.name,type:a.type,delta:-(a.balance||0),kind:'delete'});store.accounts=accts().filter(x=>x.id!==id);snapshot();persist();render();}return}
  const del=e.target.closest('[data-del]');
  if(del){const id=del.getAttribute('data-del');store.holdings=holds().filter(x=>x.id!==id);snapshot();persist();render();return}
  const showAccBtn=e.target.closest('[data-act="showAcc"]');
  if(showAccBtn){showAcc[showAccBtn.getAttribute('data-type')]=true;render();return}
  const addAccGo=e.target.closest('[data-act="addAccGo"]');
  if(addAccGo){addAccount(addAccGo.getAttribute('data-type'));return}
  if(e.target.closest('[data-addstock]')){addingStock=true;render();return}
  if(e.target.closest('[data-addstockgo]')){addStock();return}
  if(e.target.closest('[data-act="addSubGo"]')){addSub();return}
  const editSub=e.target.closest('[data-act="editSub"]');
  if(editSub){const id=editSub.getAttribute('data-id');const sub=subs().find(x=>x.id===id);if(sub){subEditId=id;Object.assign(draftSubEdit,{name:sub.name,amount:String(sub.amount),period:sub.period,renewal:sub.renewal||'',from:sub.fromAccountId||'',auto:sub.autoDeduct});render();}return}
  if(e.target.closest('[data-act="cancelSub"]')){subEditId=null;render();return}
  const saveSub=e.target.closest('[data-act="saveSub"]');
  if(saveSub){const id=saveSub.getAttribute('data-id');const sub=subs().find(x=>x.id===id);const d=draftSubEdit;const raw=String(d.amount||'').replace(/[$,\s]/g,'');const n=Number(raw);
    if(sub&&d.name&&d.name.trim()&&raw!==''&&isFinite(n)){sub.name=d.name.trim();sub.amount=n;sub.period=d.period;sub.renewal=d.renewal||null;sub.fromAccountId=d.from||null;sub.autoDeduct=!!d.auto;persist();}
    subEditId=null;render();return}
  const delSub=e.target.closest('[data-act="delSub"]');
  if(delSub){store.subs=subs().filter(x=>x.id!==delSub.getAttribute('data-id'));subEditId=null;persist();render();return}
  const toggleAuto=e.target.closest('[data-act="toggleAuto"]');
  if(toggleAuto){const sub=subs().find(x=>x.id===toggleAuto.getAttribute('data-id'));if(sub){if(!sub.autoDeduct&&!sub.fromAccountId){alert('Pick a "from account" first (use the âœŽ edit button).');}else{sub.autoDeduct=!sub.autoDeduct;persist();render();}}return}
  const orderMd=e.target.closest('[data-act="orderMode"]');
  if(orderMd){orderMode=orderMd.getAttribute('data-mode');render();return}
  if(e.target.closest('[data-act="addOrderGo"]')){addOrder();return}
  const delOrder=e.target.closest('[data-act="delOrder"]');
  if(delOrder){store.orders=orders().filter(x=>x.id!==delOrder.getAttribute('data-id'));persist();render();return}
  const deduct=e.target.closest('[data-act="deduct"]');
  if(deduct){const o=orders().find(x=>x.id===deduct.getAttribute('data-id'));if(o&&!o.deductedAt){const nw=netWorth();const pct=nw>0?(o.amount/nw)*100:0;const acc=o.fromAccountId?accts().find(a=>a.id===o.fromAccountId):null;if(acc){acc.balance=(acc.balance||0)-o.amount;pushActivity({name:acc.name,type:acc.type,delta:-o.amount,kind:'edit'});}o.deductedAt=Date.now();o.pctAtDeduction=pct;o.deductedFromName=acc?acc.name:null;snapshot();persist();render();}return}
  const undo=e.target.closest('[data-act="undoDeduct"]');
  if(undo){const o=orders().find(x=>x.id===undo.getAttribute('data-id'));if(o&&o.deductedAt){const acc=o.fromAccountId?accts().find(a=>a.id===o.fromAccountId):null;if(acc){acc.balance=(acc.balance||0)+o.amount;pushActivity({name:acc.name,type:acc.type,delta:o.amount,kind:'edit'});}o.deductedAt=null;o.pctAtDeduction=null;o.deductedFromName=null;snapshot();persist();render();}return}
  if(e.target.closest('[data-act="addWishGo"]')){addWish();return}
  const delWish=e.target.closest('[data-act="delWish"]');
  if(delWish){store.wishlist=wishlist().filter(x=>x.id!==delWish.getAttribute('data-id'));persist();render();return}
});
document.addEventListener('click',e=>{
  const b=e.target.closest('[data-bal]');if(b){editingId=b.getAttribute('data-bal');editKind='bal';render();}
});

/* standalone preview: opened as a raw file with no dashboard bridge? back it
   with localStorage so it still renders. In the real sealed dashboard the
   bridge is injected first, so this branch never runs there. */
if(!window.Vitality){window.Vitality={save:function(d){try{localStorage.setItem('v:prev:finance',JSON.stringify(d));}catch(e){}return Promise.resolve(true);},load:function(){try{return Promise.resolve(JSON.parse(localStorage.getItem('v:prev:finance')||'{}'));}catch(e){return Promise.resolve({});}},read:function(){return Promise.resolve(null);},stock:function(){return Promise.reject(new Error('no_key'));}};}
(async()=>{
  const d=await window.Vitality.load();
  store=(d&&typeof d==='object'&&!Array.isArray(d))?d:{};
  if(!Array.isArray(store.accounts))store.accounts=[];
  if(!Array.isArray(store.holdings))store.holdings=[];
  if(!Array.isArray(store.subs))store.subs=[];
  if(!Array.isArray(store.orders))store.orders=[];
  if(!Array.isArray(store.wishlist))store.wishlist=[];
  if(!Array.isArray(store.history))store.history=[];
  if(!Array.isArray(store.activity))store.activity=[];
  render();
  for(const hd of holds()){ if(!hd.symbol)continue; await refreshStock(hd); await new Promise(r=>setTimeout(r,1200)); }
})();
</script>
